name: Build & Push to ECR (Staging)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: petsfirst-ecr-broadcast-staging

jobs:
  versioning:
    name: Generate Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Bump minor version
        id: bump_version
        run: |
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"
          VERSION="${LATEST#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="v${MAJOR}.${NEW_MINOR}.0"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Create and push new tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git tag ${{ steps.bump_version.outputs.new_version }}
          git push origin ${{ steps.bump_version.outputs.new_version }}

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: versioning

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Find and untag previous latest image
        run: |
          echo "Looking for the second most recent image in ECR..."

          PREV_IMAGE_DIGEST=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --region $AWS_REGION \
            --query "sort_by(imageDetails, &imagePushedAt)[-2].imageDigest" \
            --output text 2>/dev/null)

          if [ -z "$PREV_IMAGE_DIGEST" ] || [ "$PREV_IMAGE_DIGEST" == "None" ]; then
            echo "No previous image found, skipping untag step."
          else
            echo "Previous image digest: $PREV_IMAGE_DIGEST"

            HAS_LATEST=$(aws ecr describe-images \
              --repository-name $ECR_REPOSITORY \
              --region $AWS_REGION \
              --image-ids imageDigest=$PREV_IMAGE_DIGEST \
              --query "imageDetails[0].imageTags" \
              --output text | grep -w "latest" || true)

            if [ -n "$HAS_LATEST" ]; then
              echo "Removing 'latest' tag from previous image..."
              aws ecr batch-delete-image \
                --repository-name $ECR_REPOSITORY \
                --region $AWS_REGION \
                --image-ids imageTag=latest
              echo "✅ 'latest' tag removed from previous image."
            else
              echo "Previous image does not have 'latest' tag, skipping."
            fi
          fi

      - name: Build and push image for ARM64
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.versioning.outputs.new_version }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f petsfirst-broadcast-hub-main/Dockerfile \
            petsfirst-broadcast-hub-main/ \
            --push

          echo "✅ Pushed $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG (ARM64)"
          echo "✅ Pushed $ECR_REGISTRY/$ECR_REPOSITORY:latest (ARM64)"